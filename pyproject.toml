[tool.black]
line-length = 100

extend-exclude = '''
/(
  public_dropin_notebook_environments
)/
'''

[tool.pytest.ini_options]
addopts = "--doctest-modules"
markers = ["sequential: marks tests to be executed sequentially"]
junit_family = "xunit2"
junit_logging = "all"
junit_log_passing_tests = false

[tool.isort]
profile = "black"
known_first_party = ["datarobot_drum"]

[tool.mypy]
python_version = "3.11"
plugins = "pydantic.mypy"
exclude = '''(?x)(
    ipython_config\.py
    | jupyter_kernel_gateway_config\.py
)'''

check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
enable_error_code = "ignore-without-code"
implicit_reexport = true
ignore_missing_imports = true
no_implicit_optional = true
pretty = true
show_column_numbers = true
show_error_codes = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
exclude = [
    "*.ipynb",
    "*ipython_config.py",
    "*jupyter_kernel_gateway_config.py",
]
select = ["I", "F", "PL", "C90", "E", "W"]
ignore = [
    # Magic value used in comparison, consider replacing {value} with a constant variable
    "PLR2004",
    # Do not assign a lambda expression, use a def
    "E731",
]

[tool.ruff.format]
exclude = ["*.ipynb"]
# Enable preview style formatting.
preview = true
# This is in order to work with black's skip-string-normalization we previously leveraged
quote-style = "preserve"

[tool.ruff.lint.isort]
split-on-trailing-comma = true

[tool.ruff.lint.pylint]
max-args=25
max-branches=12
max-returns=10
max-statements=75

[tool.ruff.lint.mccabe]
max-complexity = 10
