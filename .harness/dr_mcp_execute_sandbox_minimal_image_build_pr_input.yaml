inputSet:
  name: dr_mcp_execute_sandbox_minimal_image_build_pr_input
  identifier: dr_mcp_execute_sandbox_minimal_image_build_pr_input
  orgIdentifier: Custom_Models
  projectIdentifier: datarobotusermodels
  pipeline:
    identifier: env_image_publish
    properties:
      ci:
        codebase:
          build:
            type: PR
            spec:
              number: <+trigger.prNumber>
    variables:
      - name: context_path
        type: String
        value: public_dropin_environments/dr_mcp_execute_sandbox_minimal
      - name: dockerfile_path
        type: String
        value: public_dropin_environments/dr_mcp_execute_sandbox_minimal/Dockerfile
      - name: image_namespace_repo
        type: String
        value: datarobotdev/datarobot-user-models
      - name: image_tag
        type: String
        value: pr-<+trigger.prNumber>
