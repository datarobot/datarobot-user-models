inputSet:
  name: dr_mcp_execute_sandbox_minimal_image_build_default_pr_input
  identifier: dr_mcp_execute_sandbox_minimal_image_build_default_pr_input
  orgIdentifier: Custom_Models
  projectIdentifier: datarobotusermodels
  pipeline:
    identifier: env_image_publish
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: <+trigger.branch>
    variables:
      - name: env_folder
        type: String
        value: public_dropin_environments
      - name: env_name
        type: String
        value: dr_mcp_execute_sandbox_minimal
      - name: context_path
        type: String
        value: <+pipeline.variables.env_folder>/<+pipeline.variables.env_name>
      - name: dockerfile_path
        type: String
        value: <+pipeline.variables.env_folder>/<+pipeline.variables.env_name>/Dockerfile
      - name: image_tag
        type: String
        value: <+pipeline.variables.env_folder>_<+pipeline.variables.env_name>_latest
